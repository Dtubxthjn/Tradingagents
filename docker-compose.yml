services:
  tradingagents:
    build: .
    env_file:
      - .env
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    tty: true
    stdin_open: true

  web:
    build: .
    env_file:
      - .env
    environment:
      - WEB_MODE=true
    ports:
      - "8000:8000"
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:
