services:
  - type: web
    name: stock-analyzer
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANALYSIS_MODEL
        value: llama-3.3-70b-versatile
    healthCheckPath: /login
