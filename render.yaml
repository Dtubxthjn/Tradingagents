services:
  - type: web
    name: stock-analyzer
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANALYSIS_MODEL
        value: openai/gpt-4o-mini
    healthCheckPath: /login
